name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: npm run build:binary
      - run: npm run test:binary
