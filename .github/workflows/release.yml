name: Release executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run test:public
      - run: npm run build:binaries
      - run: npm run package:release
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --verify-tag --generate-notes --title "Agent Trace Hub ${GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@v7
        with:
          name: agent-trace-hub-executables
          path: release-assets/*
