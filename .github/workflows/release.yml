name: Release executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: npm ci
      - run: npm run check
      - run: npm run build:binaries
      - name: Package executables
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for file in dist-bin/agent-trace-hub-*; do
            case "$file" in
              *.sha256) continue ;;
              *.exe) zip -j "release-assets/$(basename "$file").zip" "$file" ;;
              *) tar -C dist-bin -czf "release-assets/$(basename "$file").tar.gz" "$(basename "$file")" ;;
            esac
          done
          cd release-assets
          sha256sum * > checksums.txt
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --verify-tag --generate-notes
      - uses: actions/upload-artifact@v4
        with:
          name: agent-trace-hub-executables
          path: release-assets/*
